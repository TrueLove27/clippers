<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clippers</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Kaushan+Script&family=Syne:wght@500;600;700;800&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="landing-body">

  <canvas id="particleCanvas"></canvas>

  <div class="wave-bg">
    <svg class="wave wave--1" viewBox="0 0 1440 320" preserveAspectRatio="none">
      <path d="M0,224L48,213.3C96,203,192,181,288,186.7C384,192,480,224,576,218.7C672,213,768,171,864,165.3C960,160,1056,192,1152,197.3C1248,203,1344,181,1392,170.7L1440,160L1440,320L0,320Z"/>
    </svg>
    <svg class="wave wave--2" viewBox="0 0 1440 320" preserveAspectRatio="none">
      <path d="M0,288L48,272C96,256,192,224,288,213.3C384,203,480,213,576,229.3C672,245,768,267,864,261.3C960,256,1056,224,1152,208C1248,192,1344,192,1392,192L1440,192L1440,320L0,320Z"/>
    </svg>
    <svg class="wave wave--3" viewBox="0 0 1440 320" preserveAspectRatio="none">
      <path d="M0,256L48,261.3C96,267,192,277,288,272C384,267,480,245,576,234.7C672,224,768,224,864,234.7C960,245,1056,267,1152,261.3C1248,256,1344,224,1392,208L1440,192L1440,320L0,320Z"/>
    </svg>
  </div>

  <!-- Floating decorative SVGs -->
  <div class="floaters" aria-hidden="true">
    <svg class="floater floater--1" width="64" height="64" viewBox="0 0 64 64" fill="none">
      <circle cx="32" cy="32" r="30" stroke="url(#fg1)" stroke-width="2" opacity="0.5"/>
      <polygon points="26,20 48,32 26,44" fill="url(#fg1)" opacity="0.35"/>
      <defs><linearGradient id="fg1" x1="0" y1="0" x2="64" y2="64"><stop stop-color="#00d4ff"/><stop offset="1" stop-color="#7b2ff7"/></linearGradient></defs>
    </svg>
    <svg class="floater floater--2" width="72" height="72" viewBox="0 0 72 72" fill="none">
      <circle cx="36" cy="36" r="28" stroke="#7b2ff7" stroke-width="1.5" opacity="0.4"/>
      <circle cx="36" cy="36" r="10" stroke="#00d4ff" stroke-width="1.5" opacity="0.35"/>
      <circle cx="36" cy="12" r="4" fill="#7b2ff7" opacity="0.3"/><circle cx="36" cy="60" r="4" fill="#7b2ff7" opacity="0.3"/>
      <circle cx="12" cy="36" r="4" fill="#00d4ff" opacity="0.3"/><circle cx="60" cy="36" r="4" fill="#00d4ff" opacity="0.3"/>
    </svg>
    <svg class="floater floater--3" width="80" height="60" viewBox="0 0 80 60" fill="none">
      <path d="M20,40 A16,16 0 0,1 22,10 A20,20 0 0,1 60,14 A14,14 0 0,1 60,40 Z" stroke="url(#fg3)" stroke-width="1.5" opacity="0.35"/>
      <line x1="40" y1="26" x2="40" y2="48" stroke="#00d4ff" stroke-width="1.5" opacity="0.4"/>
      <polyline points="33,41 40,48 47,41" stroke="#00d4ff" stroke-width="1.5" fill="none" opacity="0.4"/>
      <defs><linearGradient id="fg3" x1="0" y1="0" x2="80" y2="60"><stop stop-color="#00d4ff"/><stop offset="1" stop-color="#7b2ff7"/></linearGradient></defs>
    </svg>
    <svg class="floater floater--4" width="56" height="56" viewBox="0 0 56 56" fill="none">
      <circle cx="16" cy="16" r="8" stroke="#ff2d75" stroke-width="1.5" opacity="0.35"/>
      <circle cx="16" cy="40" r="8" stroke="#ff2d75" stroke-width="1.5" opacity="0.35"/>
      <line x1="22" y1="12" x2="48" y2="44" stroke="#7b2ff7" stroke-width="1.5" opacity="0.3"/>
      <line x1="22" y1="44" x2="48" y2="12" stroke="#7b2ff7" stroke-width="1.5" opacity="0.3"/>
    </svg>
    <svg class="floater floater--5" width="68" height="60" viewBox="0 0 68 60" fill="none">
      <rect x="6" y="16" width="56" height="38" rx="4" stroke="#00d4ff" stroke-width="1.5" opacity="0.3"/>
      <path d="M6,16 L16,6 L28,16 L38,6 L50,16 L60,6 L62,16" stroke="#7b2ff7" stroke-width="1.5" opacity="0.35" fill="none"/>
    </svg>
    <svg class="floater floater--6" width="50" height="56" viewBox="0 0 50 56" fill="none">
      <polygon points="25,2 48,15 48,41 25,54 2,41 2,15" stroke="url(#fg6)" stroke-width="1.5" fill="none" opacity="0.25"/>
      <polygon points="25,14 37,21 37,35 25,42 13,35 13,21" stroke="#00d4ff" stroke-width="1" fill="none" opacity="0.15"/>
      <defs><linearGradient id="fg6" x1="0" y1="0" x2="50" y2="56"><stop stop-color="#7b2ff7"/><stop offset="1" stop-color="#ff2d75"/></linearGradient></defs>
    </svg>
    <svg class="floater floater--7" width="36" height="90" viewBox="0 0 36 90" fill="none">
      <rect x="2" y="2" width="32" height="86" rx="3" stroke="#00d4ff" stroke-width="1.2" opacity="0.25"/>
      <rect x="5" y="8" width="8" height="6" rx="1" fill="#7b2ff7" opacity="0.2"/>
      <rect x="23" y="8" width="8" height="6" rx="1" fill="#7b2ff7" opacity="0.2"/>
      <rect x="9" y="50" width="18" height="14" rx="2" stroke="#00d4ff" stroke-width="1" opacity="0.2"/>
      <polygon points="15,54 23,57 15,60" fill="#00d4ff" opacity="0.2"/>
    </svg>
    <svg class="floater floater--8" width="90" height="40" viewBox="0 0 90 40" fill="none">
      <polyline points="2,20 10,8 18,28 26,6 34,32 42,12 50,26 58,10 66,30 74,14 82,22 90,18" stroke="url(#fg8)" stroke-width="1.5" fill="none" opacity="0.3"/>
      <defs><linearGradient id="fg8" x1="0" y1="0" x2="90" y2="0"><stop stop-color="#00d4ff"/><stop offset="0.5" stop-color="#7b2ff7"/><stop offset="1" stop-color="#ff2d75"/></linearGradient></defs>
    </svg>
  </div>

  <!-- ================================================================
       HERO  — cinematic logo entrance, then small action buttons
       ================================================================ -->
  <div class="hero" id="hero">

    <!-- Glow burst behind logo -->
    <div class="hero__glow"></div>

    <!-- Monitor illustration -->
    <div class="hero__icon anim-pop" style="--delay:.2s">
      <svg width="80" height="62" viewBox="0 0 120 90" fill="none">
        <rect x="10" y="4" width="100" height="64" rx="6" stroke="url(#hg)" stroke-width="2" opacity="0.6"/>
        <rect x="18" y="12" width="84" height="48" rx="3" fill="rgba(0,212,255,0.04)" stroke="rgba(0,212,255,0.15)" stroke-width="1"/>
        <polygon points="50,28 70,38 50,48" fill="url(#hg)" opacity="0.5"/>
        <line x1="45" y1="68" x2="75" y2="68" stroke="#7b2ff7" stroke-width="2" opacity="0.4"/>
        <line x1="52" y1="68" x2="52" y2="80" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
        <line x1="68" y1="68" x2="68" y2="80" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
        <line x1="40" y1="80" x2="80" y2="80" stroke="rgba(0,212,255,0.25)" stroke-width="2" stroke-linecap="round"/>
        <circle cx="94" cy="18" r="2.5" fill="#ff2d75" opacity="0.5"/>
        <circle cx="86" cy="18" r="2.5" fill="#00ff88" opacity="0.4"/>
        <defs><linearGradient id="hg" x1="10" y1="4" x2="110" y2="70"><stop stop-color="#00d4ff"/><stop offset="1" stop-color="#7b2ff7"/></linearGradient></defs>
      </svg>
    </div>

    <!-- Logo -->
    <h1 class="hero__title anim-pop" style="--delay:.5s">
      <span class="brand-script">Clippers</span>
    </h1>

    <!-- Tagline — letters stagger in -->
    <p class="hero__tagline anim-pop" style="--delay:.9s">
      <span>D</span><span>o</span><span>w</span><span>n</span><span>l</span><span>o</span><span>a</span><span>d</span>
      <span class="dot">&middot;</span>
      <span>C</span><span>l</span><span>i</span><span>p</span>
      <span class="dot">&middot;</span>
      <span>C</span><span>r</span><span>e</span><span>a</span><span>t</span><span>e</span>
    </p>

    <!-- Animated horizontal rule -->
    <div class="hero__rule anim-pop" style="--delay:1.2s"></div>

    <!-- Action buttons -->
    <div class="hero__actions anim-pop" style="--delay:1.4s">
      <button class="btn btn--primary btn--lg" id="openLogin">Sign In</button>
      <button class="btn btn--outline btn--lg" id="openSignup">Get Started</button>
    </div>

    <button class="hero__guest anim-pop" style="--delay:1.7s" id="guestBtn">
      or continue as guest &rarr;
    </button>
  </div>

  <!-- ================================================================
       AUTH MODAL  — slides up when Sign In / Get Started is clicked
       ================================================================ -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal-backdrop" id="modalBackdrop"></div>
    <div class="modal-sheet" id="modalSheet">
      <button class="modal-close" id="modalClose" aria-label="Close">&times;</button>

      <div class="auth-card" id="authCard">
        <!-- FRONT — Login -->
        <div class="auth-card__face auth-card__face--front">
          <h2>Welcome back</h2>
          <form id="loginForm" autocomplete="on">
            <div class="input-group">
              <input type="email" id="loginEmail" required placeholder=" ">
              <label>Email</label>
              <span class="bar"></span>
            </div>
            <div class="input-group">
              <input type="password" id="loginPassword" required placeholder=" ">
              <label>Password</label>
              <span class="bar"></span>
            </div>
            <button type="submit" class="btn btn--primary">Sign In</button>
          </form>
          <div class="divider"><span>or</span></div>
          {% if google_client_id %}
          <div id="g_id_onload"
               data-client_id="{{ google_client_id }}"
               data-callback="handleGoogleAuth"
               data-auto_prompt="false"></div>
          <div class="g_id_signin" data-type="standard" data-size="large" data-theme="filled_black" data-text="signin_with" data-shape="pill"></div>
          {% else %}
          <button class="btn btn--google" disabled title="Set GOOGLE_CLIENT_ID env var to enable">
            <svg viewBox="0 0 48 48" width="20" height="20"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59a14.5 14.5 0 0 1 0-9.18l-7.98-6.19a24.1 24.1 0 0 0 0 21.56l7.98-6.19z"/><path fill="#34A853" d="M24 48c6.47 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
            Google (not configured)
          </button>
          {% endif %}
          <p class="switch-link">Don't have an account? <a href="#" id="showSignup">Create one</a></p>
        </div>

        <!-- BACK — Sign-up -->
        <div class="auth-card__face auth-card__face--back">
          <h2>Create account</h2>
          <form id="signupForm" autocomplete="on">
            <div class="input-group">
              <input type="text" id="signupName" required placeholder=" ">
              <label>Name</label>
              <span class="bar"></span>
            </div>
            <div class="input-group">
              <input type="email" id="signupEmail" required placeholder=" ">
              <label>Email</label>
              <span class="bar"></span>
            </div>
            <div class="input-group">
              <input type="password" id="signupPassword" required minlength="6" placeholder=" ">
              <label>Password (min 6 chars)</label>
              <span class="bar"></span>
            </div>
            <button type="submit" class="btn btn--primary">Create Account</button>
          </form>
          <p class="switch-link">Already have an account? <a href="#" id="showLogin">Sign in</a></p>
        </div>
      </div>
    </div>
  </div>

  <p class="auth-error" id="authError"></p>

  {% if google_client_id %}
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  {% endif %}
  <script src="{{ url_for('static', filename='js/particles.js') }}"></script>
  <script>
    initParticles('particleCanvas', { density: 90, speed: 0.4, linkDist: 140, mouseRadius: 120 });

    /* ---- Modal logic ---- */
    const overlay  = document.getElementById('modalOverlay');
    const sheet    = document.getElementById('modalSheet');
    const card     = document.getElementById('authCard');

    function openModal(showSignup) {
      if (showSignup) card.classList.add('is-flipped'); else card.classList.remove('is-flipped');
      overlay.classList.add('open');
      requestAnimationFrame(() => overlay.classList.add('visible'));
    }
    function closeModal() {
      overlay.classList.remove('visible');
      setTimeout(() => overlay.classList.remove('open'), 400);
    }

    document.getElementById('openLogin').addEventListener('click', () => openModal(false));
    document.getElementById('openSignup').addEventListener('click', () => openModal(true));
    document.getElementById('modalBackdrop').addEventListener('click', closeModal);
    document.getElementById('modalClose').addEventListener('click', closeModal);
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

    document.getElementById('showSignup').addEventListener('click', e => { e.preventDefault(); card.classList.add('is-flipped'); });
    document.getElementById('showLogin').addEventListener('click', e => { e.preventDefault(); card.classList.remove('is-flipped'); });

    /* ---- Auth ---- */
    const errEl = document.getElementById('authError');
    function showErr(msg) { errEl.textContent = msg; errEl.classList.add('visible'); setTimeout(() => errEl.classList.remove('visible'), 4000); }

    async function post(url, body) {
      const r = await fetch(url, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
      return r.json();
    }

    document.getElementById('loginForm').addEventListener('submit', async e => {
      e.preventDefault();
      const res = await post('/api/auth/login', {
        email: document.getElementById('loginEmail').value,
        password: document.getElementById('loginPassword').value,
      });
      if (res.ok) window.location.href = '/dashboard'; else showErr(res.error);
    });

    document.getElementById('signupForm').addEventListener('submit', async e => {
      e.preventDefault();
      const res = await post('/api/auth/signup', {
        name: document.getElementById('signupName').value,
        email: document.getElementById('signupEmail').value,
        password: document.getElementById('signupPassword').value,
      });
      if (res.ok) window.location.href = '/dashboard'; else showErr(res.error);
    });

    document.getElementById('guestBtn').addEventListener('click', async () => {
      const res = await post('/api/auth/guest', {});
      if (res.ok) window.location.href = '/dashboard'; else showErr(res.error);
    });

    async function handleGoogleAuth(response) {
      const res = await post('/api/auth/google', { credential: response.credential });
      if (res.ok) window.location.href = '/dashboard'; else showErr(res.error);
    }
  </script>
</body>
</html>
